[package]
name = "parquet-compactor-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pcompact"
path = "src/main.rs"

[[bin]]
name = "generate_sample_data"
path = "src/bin/generate_sample_data.rs"

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
tracing = "0.1"
tracing-subscriber = "0.3"
parquet = { version = "58", features = ["arrow"] }
arrow-array = "58"
arrow-schema = "58"
rand = "0.8"

[dev-dependencies]
tempfile = "3"